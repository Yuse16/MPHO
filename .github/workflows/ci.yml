name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm security:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Start local Supabase
        run: pnpm db:start
      - name: Export local Supabase public configuration
        shell: bash
        run: |
          set -euo pipefail
          STATUS_FILE="$(mktemp)"
          trap 'rm -f "$STATUS_FILE"' EXIT
          npx supabase status -o env > "$STATUS_FILE"

          API_URL="$(sed -n 's/^API_URL="\(.*\)"$/\1/p' "$STATUS_FILE")"
          ANON_KEY="$(sed -n 's/^ANON_KEY="\(.*\)"$/\1/p' "$STATUS_FILE")"

          if [ -z "$API_URL" ] || [ -z "$ANON_KEY" ]; then
            echo "Unable to read API_URL and ANON_KEY from the local Supabase stack." >&2
            exit 1
          fi

          echo "::add-mask::$ANON_KEY"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"
      - run: pnpm db:reset
      - run: pnpm db:test
      - run: pnpm db:test:rest
      - run: pnpm db:types
      - run: pnpm db:types:check
      - run: pnpm db:schema:check
      - run: pnpm build
      - name: Stop local Supabase
        if: always()
        run: pnpm db:stop
